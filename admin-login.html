<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="admin-login">
    <main class="page-shell">
        <div class="container narrow">
            <p class="eyebrow">Management Access</p>
            <h2>Admin Login</h2>
            <form onsubmit="return loginAdmin(event)">
                <input type="text" id="adminUsername" placeholder="Admin Username" required>
                <input type="password" id="adminPassword" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <div id="adminLoginMessage" class="status-message"></div>
            <p class="helper-text"><a href="index.html">Back to home</a></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
