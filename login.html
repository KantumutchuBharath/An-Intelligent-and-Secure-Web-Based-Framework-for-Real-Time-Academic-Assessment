<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
    <main class="page-shell">
        <div class="container narrow">
            <p class="eyebrow">Student Access</p>
            <h2>User Login</h2>
            <form onsubmit="return loginUser(event)">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <div id="loginMessage" class="status-message"></div>
            <p class="helper-text">New here? <a href="register.html">Create an account</a></p>
            <p class="helper-text"><a href="index.html">Back to home</a></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
