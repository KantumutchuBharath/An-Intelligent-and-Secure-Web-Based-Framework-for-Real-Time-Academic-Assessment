<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="result">
    <main class="dashboard-shell">
        <section class="result-hero">
            <p class="eyebrow">Test Submitted</p>
            <h2 id="resultTitle">Quiz Result</h2>
            <div class="result-metrics">
                <div class="metric-card">
                    <span class="metric-label">Score</span>
                    <strong id="resultScore">0/0</strong>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Percentage</span>
                    <strong id="resultPercentage">0%</strong>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Completed</span>
                    <strong id="resultDate">-</strong>
                </div>
            </div>
            <p id="resultFeedback" class="hero-copy"></p>
            <p id="resultReleaseNote" class="helper-text"></p>
            <div class="hero-actions">
                <button type="button" id="reviewAttemptButton" class="btn">Review Answers</button>
                <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
